<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Liste des Étudiants</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">
    <h1 class="mb-4">Liste des Étudiants</h1>
    <a href="{% url 'creer_etudiant' %}" class="btn btn-primary mb-3">Ajouter un étudiant</a>
    <table class="table table-hover">
        <thead>
            <tr>
                <th>Nom</th>
                <th>Prénom</th>
                <th>Email</th>
                <th>Statut</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for etudiant in etudiants %}
            <tr>
                <td>{{ etudiant.nom }}</td>
                <td>{{ etudiant.prenom }}</td>
                <td>{{ etudiant.email }}</td>
                <td>{{ etudiant.get_statut_display }}</td>
                <td>
                    <a href="{% url 'modifier_etudiant' etudiant.pk %}" class="btn btn-sm btn-warning">Modifier</a>
                    <a href="{% url 'supprimer_etudiant' etudiant.pk %}" class="btn btn-sm btn-danger">Supprimer</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5">Aucun étudiant inscrit.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="{% url 'liste_cours' %}" class="btn btn-secondary mt-3">Retour aux cours</a>
</body>
</html>

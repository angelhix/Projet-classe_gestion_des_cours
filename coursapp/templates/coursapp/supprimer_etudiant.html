<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Supprimer un Étudiant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">
    <h1>Supprimer un Étudiant</h1>
    <p>Êtes-vous sûr de vouloir supprimer l’étudiant <strong>{{ etudiant.nom }} {{ etudiant.prenom }}</strong> ?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Supprimer</button>
        <a href="{% url 'liste_etudiants' %}" class="btn btn-secondary">Annuler</a>
    </form>
</body>
</html>
